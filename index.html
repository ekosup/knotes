<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENotes — Cornell Notes for Deep Learning</title>
  <meta name="description" content="A lightweight, offline-first Cornell Notes application. Zero cloud, zero tracking — your notes stay yours." />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app" data-active-tab="edit">
    <!-- Top Navbar -->
    <header id="navbar">
      <div class="navbar-section navbar-start">
        <span class="logo-icon"></span>
        <h1 class="logo">ENotes</h1>
      </div>

      <div class="navbar-section navbar-center">
        <button id="palette-trigger" class="palette-trigger" title="Search notes (Ctrl+K)">
          <span class="trigger-search-icon"></span>
          <span id="current-note-label">Search notes…</span>
          <span class="trigger-kbd">⌘K</span>
        </button>
      </div>

      <div class="navbar-section navbar-end">
        <span id="word-count" class="word-count"></span>
        <span id="storage-info" class="storage-info"></span>
        <span id="status-badge" class="badge">Offline</span>
        <button id="btn-sync" class="btn btn-ghost btn-icon-only" title="Sync with cloud"></button>
        <button id="btn-theme" class="btn btn-ghost btn-icon-only" title="Toggle theme"></button>
      </div>
    </header>

    <!-- Main Layout -->
    <div id="layout">
      <!-- Left Sidebar: Cues -->
      <aside id="sidebar">
        <div class="panel-header">
          <h2>Cues</h2>
          <div class="panel-controls">
            <button id="btn-add-cue" class="btn btn-ghost btn-icon-only btn-sm" title="Add cue"></button>
            <button id="btn-maximize-cues" class="btn btn-ghost btn-icon-only btn-sm" title="Maximize cues panel"></button>
          </div>
        </div>
        <ul id="cues-list"></ul>
      </aside>
      <div id="resize-sidebar" class="resize-handle resize-handle-v"></div>

      <!-- Main Area: Editor + Preview -->
      <main id="main-area">
        <div class="title-row">
          <input
            type="text"
            id="note-title"
            placeholder="Untitled note…"
            autocomplete="off"
            spellcheck="true"
          />
          <button id="btn-toggle-preview" class="btn btn-ghost btn-icon-only" title="Toggle preview"></button>
          <button id="btn-pin" class="btn btn-ghost btn-icon-only" title="Pin note"></button>
        </div>
        <div class="tags-row">
          <div id="tags-list"></div>
          <input
            type="text"
            id="tag-input"
            class="tag-input-inline"
            placeholder="Add tag…"
            autocomplete="off"
          />
        </div>
        <div id="editor-container">
          <div class="editor-pane">
            <textarea
              id="editor-textarea"
              placeholder="Start writing in Markdown…"
              spellcheck="true"
            ></textarea>
          </div>
          <div id="resize-editor-preview" class="resize-handle resize-handle-v"></div>
          <div id="preview-pane" class="preview-pane">
            <div class="preview-header">
              <span class="preview-header-label">Preview</span>
              <div class="panel-controls">
                <button id="btn-toc-preview" class="btn btn-ghost btn-icon-only btn-sm" title="Table of contents" style="display:none"></button>
                <button id="btn-hide-preview" class="btn btn-ghost btn-icon-only btn-sm" title="Hide preview"></button>
                <button id="btn-maximize-preview" class="btn btn-ghost btn-icon-only btn-sm" title="Maximize preview"></button>
                <button id="btn-present-preview" class="btn btn-ghost btn-icon-only btn-sm" title="Present mode"></button>
              </div>
            </div>
            <div id="preview-toc-overlay" class="preview-toc-overlay"></div>
            <div id="preview-content" class="prose"></div>
          </div>
        </div>
      </main>
    </div>

    <div id="resize-summary" class="resize-handle resize-handle-h"></div>

    <!-- Bottom Panel: Summary -->
    <footer id="bottom-panel">
      <div class="panel-header">
        <label for="summary-textarea">Summary</label>
        <div class="panel-controls">
          <button id="btn-maximize-summary" class="btn btn-ghost btn-icon-only btn-sm" title="Maximize summary panel"></button>
        </div>
      </div>
      <textarea
        id="summary-textarea"
        placeholder="Synthesize your notes into a concise summary…"
        rows="3"
      ></textarea>
    </footer>

    <!-- Hidden file input -->
    <input type="file" id="import-file" accept=".json,.md,.markdown" hidden />

    <!-- Command Palette -->
    <div id="command-palette" class="command-palette" hidden>
      <div class="palette-backdrop"></div>
      <div class="palette-dialog">
        <div class="palette-search">
          <span class="palette-search-icon"></span>
          <input id="palette-input" type="text" placeholder="Search notes…" autocomplete="off" spellcheck="false" />
          <span id="palette-tag-badge" class="palette-tag-badge" style="display:none"></span>
        </div>
        <div id="palette-results" class="palette-results"></div>
        <div id="palette-actions" class="palette-actions"></div>
        <div class="palette-footer">
          <span><kbd>↑↓</kbd> Navigate</span>
          <span><kbd>↵</kbd> Select</span>
          <span><kbd>Esc</kbd> Close</span>
        </div>
      </div>
    </div>

    <!-- Presentation Overlay -->
    <div id="presentation-overlay" class="presentation-overlay" style="display: none;">
      <div class="presentation-header">
        <span id="presentation-note-title" class="presentation-title">Untitled note…</span>
        <div class="presentation-header-actions" style="display: flex; gap: 8px;">
          <button id="btn-present-fullscreen" class="btn btn-ghost btn-icon-only btn-sm" title="Enter Fullscreen (F)"></button>
          <button id="btn-present-close" class="btn btn-ghost btn-icon-only btn-sm" title="Exit presentation (Esc)"></button>
        </div>
      </div>
      <div class="presentation-body">
        <div id="presentation-slide-box" class="slide-box">
          <div id="presentation-slide-content" class="prose slide-content"></div>
        </div>
      </div>
      <!-- Translucent HUD controls -->
      <div class="presentation-hud">
        <button id="btn-present-prev" class="btn btn-ghost btn-icon-only btn-sm" title="Previous slide (←)"></button>
        <span id="present-slide-counter" class="present-slide-counter">1 / 1</span>
        <button id="btn-present-next" class="btn btn-ghost btn-icon-only btn-sm" title="Next slide (→, Space)"></button>
        <div class="hud-divider"></div>
        <button id="btn-present-zoom-out" class="btn btn-ghost btn-icon-only btn-sm" title="Zoom out"></button>
        <span id="present-zoom-level" class="present-zoom-level">100%</span>
        <button id="btn-present-zoom-in" class="btn btn-ghost btn-icon-only btn-sm" title="Zoom in"></button>
      </div>
    </div>

    <!-- Mobile Tab Bar (Visible only on mobile devices) -->
    <div id="mobile-tab-bar" class="mobile-tab-bar">
      <button class="mobile-tab-btn" data-tab="cues">
        <span class="mobile-tab-icon"></span>
        <span class="mobile-tab-label">Cues</span>
      </button>
      <button class="mobile-tab-btn active" data-tab="edit">
        <span class="mobile-tab-icon"></span>
        <span class="mobile-tab-label">Edit</span>
      </button>
      <button class="mobile-tab-btn" data-tab="preview">
        <span class="mobile-tab-icon"></span>
        <span class="mobile-tab-label">Preview</span>
      </button>
      <button class="mobile-tab-btn" data-tab="summary">
        <span class="mobile-tab-icon"></span>
        <span class="mobile-tab-label">Summary</span>
      </button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>

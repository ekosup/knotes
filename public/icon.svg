<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0052d4" />
      <stop offset="50%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <!-- Icon Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#001845" flood-opacity="0.25" />
    </filter>
  </defs>
  <!-- Rounded Rect Background with Gradient -->
  <rect width="512" height="512" rx="120" fill="url(#bg-grad)" />
  <!-- Notepad Icon Sheet -->
  <g transform="translate(136, 120)" filter="url(#shadow)">
    <!-- Main Notebook body -->
    <rect x="10" y="30" width="220" height="270" rx="28" fill="#ffffff"/>
    <!-- Top Binding Rings -->
    <rect x="40" y="10" width="18" height="46" rx="9" fill="#1d4ed8" />
    <rect x="110" y="10" width="18" height="46" rx="9" fill="#1d4ed8" />
    <rect x="180" y="10" width="18" height="46" rx="9" fill="#1d4ed8" />
    <!-- Horizontal lines representing writing -->
    <line x1="56" y1="110" x2="184" y2="110" stroke="#1d4ed8" stroke-width="12" stroke-linecap="round" opacity="0.85" />
    <line x1="56" y1="170" x2="184" y2="170" stroke="#1d4ed8" stroke-width="12" stroke-linecap="round" opacity="0.85" />
    <line x1="56" y1="230" x2="140" y2="230" stroke="#1d4ed8" stroke-width="12" stroke-linecap="round" opacity="0.85" />
  </g>
</svg>
